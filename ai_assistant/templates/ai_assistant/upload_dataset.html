<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dataset</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }

        .page-title{
            font-size:48px;
            font-weight:700;
            color:#2563eb;
        }

        .card-box{
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .btn-upload{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 28px;
            border-radius:10px;
            font-weight:600;
        }

        .btn-upload:hover{
            background:#1d4ed8;
            color:white;
        }

        .form-control{
            border-radius:10px;
            height:48px;
        }

        .dashboard-btn{
            background:#222;
            color:white;
            border:none;
            padding:10px 22px;
            border-radius:10px;
            text-decoration:none;
        }

        .dashboard-btn:hover{
            color:white;
            background:#000;
        }

        .upload-icon{
            font-size:70px;
        }

        .alert{
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1 class="page-title">
                Dataset Upload
            </h1>

            <p class="text-muted">
                Upload a CSV dataset to create a PostgreSQL table automatically.
            </p>
        </div>

        <a href="/api/dashboard/" class="dashboard-btn">
            ← Dashboard
        </a>

    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="card-box">

        <div class="text-center mb-4">
            <div class="upload-icon">
                📂
            </div>
        </div>

        <form
            action="/api/upload-dataset/"
            method="POST"
            enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Dataset Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name"
                    placeholder="Example: Student Dataset"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    PostgreSQL Table Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="table_name"
                    placeholder="Example: students"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Select CSV File
                </label>

                <input
                    type="file"
                    class="form-control"
                    name="uploaded_file"
                    accept=".csv"
                    required>

            </div>

            <div class="text-center">

                <button
                    type="submit"
                    class="btn-upload">

                    Upload Dataset

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
