<!DOCTYPE html>

<html>

<head>

    <title>

        Students

    </title>

    <link

        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

        rel="stylesheet">

<style>

body{

    background:#f5f7fb;

}

.card{

    border:none;

    border-radius:18px;

    box-shadow:0 6px 20px rgba(0,0,0,.08);

}

.btn{

    transition:.3s;

}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(0,0,0,.15);

}

.badge{

    font-size:.75rem;

}

</style>

</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold text-primary">

                Students

            </h1>

            <p class="text-muted">

                Total Students :

                <strong>

                    {{ student_count }}

                </strong>

            </p>

        </div>

        <div>

            <a

                href="/api/dashboard/"

                class="btn btn-dark">

                ← Dashboard

            </a>

            <button

                class="btn btn-primary"

                data-bs-toggle="modal"

                data-bs-target="#studentModal">

                + Add Student

            </button>

        </div>

    </div>


    <div class="card p-4">

        <input

            type="text"

            id="search"

            class="form-control mb-4"

            placeholder="Search students...">

        <div class="table-responsive">

            <table class="table table-hover">

                <thead>

                <tr>

                    <th>

                        Student ID

                    </th>

                    <th>

                        Name

                    </th>

                    <th>

                        Marks

                    </th>

                    <th>

                        Category

                    </th>

                    <th>

                        Applied On

                    </th>

                </tr>

                </thead>

                <tbody id="student-table">

                {% for student in students %}

                <tr>

                    <td>

                        {{ student.student_id }}

                    </td>

                    <td>

                        {{ student.name }}

                    </td>

                    <td>

                        {{ student.marks }}

                    </td>

                    <td>

                        <span class="badge bg-primary">

                            {{ student.category }}

                        </span>

                    </td>

                    <td>

                        {{ student.application_date }}

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>


<!-- Modal -->

<div

class="modal fade"

id="studentModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>

Add Student

</h5>

<button

class="btn-close"

data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<input

id="student_id"

class="form-control mb-3"

placeholder="Student ID">

<input

id="name"

class="form-control mb-3"

placeholder="Name">

<input

id="marks"

class="form-control mb-3"

placeholder="Marks">

<select

id="category"

class="form-control mb-3">

<option>

GENERAL

</option>

<option>

OBC

</option>

<option>

SC

</option>

<option>

ST

</option>

</select>

<input

type="date"

id="application_date"

class="form-control mb-3">

</div>

<div class="modal-footer">

<button

class="btn btn-primary"

onclick="saveStudent()">

Save

</button>

</div>

</div>

</div>

</div>


<script>

async function saveStudent(){

    const response =

    await fetch(

        "/api/students/",

        {

            method:"POST",

            headers:{

                "Content-Type":

                "application/json"

            },

            body:JSON.stringify({

                student_id:

                document.getElementById(

                    "student_id"

                ).value,

                name:

                document.getElementById(

                    "name"

                ).value,

                marks:

                document.getElementById(

                    "marks"

                ).value,

                category:

                document.getElementById(

                    "category"

                ).value,

                application_date:

                document.getElementById(

                    "application_date"

                ).value

            })

        }

    );

    if(response.ok){

        location.reload();

    }

    else{

        alert(

            "Failed to add student"

        );

    }

}


document

.getElementById(

    "search"

)

.addEventListener(

    "keyup",

    function(){

        const value =

        this.value

        .toLowerCase();

        const rows =

        document

        .querySelectorAll(

            "#student-table tr"

        );

        rows.forEach(

            row=>{

            row.style.display=

            row.innerText

            .toLowerCase()

            .includes(value)

            ?""

            :"none";

        });

});

</script>


<script

src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
