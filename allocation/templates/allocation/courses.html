<!DOCTYPE html>

<html>

<head>

    <title>

        Courses

    </title>

    <link

        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

        rel="stylesheet">

<style>

body{

    background:#F8FAFC;

}


.card{

    border:none;

    border-radius:18px;

    box-shadow:0 6px 20px rgba(0,0,0,.08);

}


.btn{

    transition:.3s;

}


.btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(0,0,0,.15);

}


table tbody tr{

    transition:.2s;

}


table tbody tr:hover{

    background:#EFF6FF;

}

</style>

</head>

<body>

<div class="container py-5">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1

            class="fw-bold"

            style="color:#2563EB;">

                Courses

            </h1>

            <p class="text-muted">

                Total Courses :

                <strong>

                    {{ courses|length }}

                </strong>

            </p>

        </div>


        <div>

            <a

                href="/api/dashboard/"

                class="btn"

                style="

                background:#0F172A;

                color:white;

                border-radius:12px;

                ">

                ← Dashboard

            </a>


            <button

                class="btn"

                style="

                background:#2563EB;

                color:white;

                border-radius:12px;

                "

                data-bs-toggle="modal"

                data-bs-target="#courseModal">

                + Add Course

            </button>

        </div>

    </div>



    <!-- Search -->

    <div class="card p-4">

        <input

            type="text"

            id="search"

            class="form-control mb-4"

            placeholder="Search courses...">



        <div class="table-responsive">

            <table class="table table-hover">

                <thead>

                <tr>

                    <th>

                        Course Name

                    </th>

                    <th>

                        Total Seats

                    </th>

                </tr>

                </thead>

                <tbody id="course-table">

                {% for course in courses %}

                <tr>

                    <td>

                        {{ course.course_name }}

                    </td>

                    <td>

                        <span

                        class="badge"

                        style="

                        background:#DBEAFE;

                        color:#1E40AF;

                        font-size:.9rem;

                        ">

                            {{ course.total_seats }}

                        </span>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>



<!-- Add Course Modal -->

<div

class="modal fade"

id="courseModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>

Add Course

</h5>

<button

class="btn-close"

data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">


<input

id="course_name"

class="form-control mb-3"

placeholder="Course Name">


<input

id="total_seats"

class="form-control"

placeholder="Total Seats"


type="number">

</div>


<div class="modal-footer">

<button

class="btn btn-primary"

onclick="saveCourse()">

Save

</button>

</div>

</div>

</div>

</div>



<script>

async function saveCourse(){

    const response =

    await fetch(

        "/api/courses/",

        {

            method:"POST",

            headers:{

                "Content-Type":

                "application/json"

            },

            body:JSON.stringify({

                course_name:

                document.getElementById(

                    "course_name"

                ).value,

                total_seats:

                document.getElementById(

                    "total_seats"

                ).value

            })

        }

    );

    if(response.ok){

        location.reload();

    }

    else{

        alert(

            "Failed to add course"

        );

    }

}



document

.getElementById(

    "search"

)

.addEventListener(

    "keyup",

    function(){

        const value =

        this.value

        .toLowerCase();

        const rows =

        document

        .querySelectorAll(

            "#course-table tr"

        );

        rows.forEach(

            row=>{

            row.style.display=

            row.innerText

            .toLowerCase()

            .includes(value)

            ?""

            :"none";

        });

});

</script>


<script

src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
