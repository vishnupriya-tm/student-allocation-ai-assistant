<!DOCTYPE html>
<html>

<head>

<title>

Seat Reservations

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

.card{

    border-radius:18px;

}

.btn{

    transition:.25s;

}

.btn:hover{

    transform:translateY(-2px);

}

</style>

</head>

<body style="background:#F8FAFC;">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-5">

    <h1 class="text-primary fw-bold">

        Seat Reservations

    </h1>

    <a
    href="/api/dashboard/"
    class="btn btn-dark">

        ← Dashboard

    </a>

</div>



<!-- Form -->

<div class="card shadow-sm border-0 mb-5">

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-4">

<label class="form-label">

Course

</label>

<select
name="course"
class="form-select"
required>

<option value="">

Select Course

</option>

{% for course in courses %}

<option
value="{{ course.id }}">

{{ course.course_name }}

</option>

{% endfor %}

</select>

</div>



<div class="col-md-4">

<label class="form-label">

Category

</label>

<select
name="category"
class="form-select"
required>

<option value="GENERAL">

GENERAL

</option>

<option value="OBC">

OBC

</option>

<option value="SC">

SC

</option>

<option value="ST">

ST

</option>

</select>

</div>



<div class="col-md-4">

<label class="form-label">

Reserved Seats

</label>

<input

type="number"

name="reserved_seats"

class="form-control"

required>

</div>

</div>



<div class="text-end mt-4">

<button

type="submit"

class="btn btn-primary">

+ Add Reservation

</button>

</div>

</form>

</div>

</div>



<!-- History -->

<div class="card shadow-sm border-0">

<div class="card-header bg-primary text-white">

Reservation History

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>

<th>

Course

</th>

<th>

Category

</th>

<th>

Reserved Seats

</th>

</tr>

</thead>

<tbody>

{% for reservation in reservations %}

<tr>

<td>

{{ reservation.course.course_name }}

</td>

<td>

<span class="badge bg-secondary">

{{ reservation.category }}

</span>

</td>

<td>

{{ reservation.reserved_seats }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>

</html>
